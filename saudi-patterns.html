<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Saudi Regional Pattern Library</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: #F7F4EF;
    color: #1A1614;
    padding: 2rem;
    min-height: 100vh;
  }
  header {
    margin-bottom: 2rem;
  }
  header h1 {
    font-size: 22px;
    font-weight: 600;
    color: #1A1614;
    letter-spacing: -0.3px;
  }
  header p {
    font-size: 14px;
    color: #6B6560;
    margin-top: 4px;
  }

  .preview-area {
    height: 200px;
    border-radius: 16px;
    border: 1px solid #E2DDD8;
    margin-bottom: 2rem;
    display: flex;
    align-items: flex-end;
    padding: 1.25rem;
    transition: background-image 0.3s;
    background: #E8E3DC;
  }
  .preview-label {
    background: rgba(0,0,0,0.6);
    color: #fff;
    padding: 6px 14px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 500;
  }
  .preview-label span {
    display: block;
    font-size: 12px;
    font-weight: 400;
    opacity: 0.75;
    margin-top: 2px;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 16px;
  }
  .card {
    background: #fff;
    border: 1px solid #E2DDD8;
    border-radius: 14px;
    overflow: hidden;
    cursor: pointer;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .card:hover {
    border-color: #A89880;
    box-shadow: 0 2px 12px rgba(0,0,0,0.07);
  }
  .card.active {
    border-color: #7A5C3A;
    border-width: 2px;
  }
  .swatch {
    height: 120px;
  }
  .info {
    padding: 12px 14px;
  }
  .name-ar {
    font-size: 18px;
    font-weight: 600;
    direction: rtl;
    text-align: right;
    color: #1A1614;
    line-height: 1.3;
  }
  .name-en {
    font-size: 14px;
    font-weight: 600;
    color: #1A1614;
    margin-top: 2px;
  }
  .reg {
    font-size: 12px;
    color: #7A7470;
    margin: 4px 0 10px;
  }
  .colors {
    display: flex;
    gap: 6px;
    margin-bottom: 10px;
  }
  .dot {
    width: 15px;
    height: 15px;
    border-radius: 50%;
    border: 1px solid rgba(0,0,0,0.12);
  }
  .acts {
    display: flex;
    gap: 6px;
  }
  .btn {
    font-size: 12px;
    padding: 5px 12px;
    border-radius: 8px;
    cursor: pointer;
    border: 1px solid #D4CEC8;
    background: transparent;
    color: #1A1614;
    font-family: inherit;
    transition: background 0.15s;
  }
  .btn:hover { background: #F0EBE4; }
  .btn.preview-btn { background: #F0EBE4; }
  .btn.copied {
    background: #D4EDDA;
    color: #1D6331;
    border-color: #A8D5B5;
  }

  .unescobadge {
    display: inline-block;
    font-size: 10px;
    font-weight: 600;
    background: #E8F0FB;
    color: #2D5EA8;
    padding: 2px 6px;
    border-radius: 4px;
    margin-left: 4px;
    vertical-align: middle;
  }
</style>
</head>
<body>

<header>
  <h1>Saudi Regional Pattern Library</h1>
  <p>5 authentic patterns · traditional &amp; cultural · click any card to preview · copy CSS to use in your webapp</p>
</header>

<div class="preview-area" id="preview">
  <div class="preview-label" id="prev-label">
    Select a pattern to preview
    <span id="prev-sub">Click any card below</span>
  </div>
</div>

<div class="grid" id="grid"></div>

<script>
const patterns = [
  {
    id: 'asir',
    ar: 'القط العسيري',
    en: 'Al-Qatt Al-Asiri',
    reg: 'Asir Region',
    unesco: '2017',
    colors: ['#C1292E','#1B6A5A','#E8A838','#2D5EA8','#F2EDD7'],
    size: '80px 80px',
    svg: `<svg xmlns='http://www.w3.org/2000/svg' width='80' height='80'>
      <rect width='80' height='80' fill='#F2EDD7'/>
      <polygon points='0,0 20,0 10,18' fill='#C1292E'/>
      <polygon points='20,0 40,0 30,18' fill='#1B6A5A'/>
      <polygon points='40,0 60,0 50,18' fill='#E8A838'/>
      <polygon points='60,0 80,0 70,18' fill='#2D5EA8'/>
      <polygon points='10,32 18,40 10,48 2,40' fill='#2D5EA8'/>
      <polygon points='30,32 38,40 30,48 22,40' fill='#C1292E'/>
      <polygon points='50,32 58,40 50,48 42,40' fill='#1B6A5A'/>
      <polygon points='70,32 78,40 70,48 62,40' fill='#E8A838'/>
      <polygon points='0,80 20,80 10,62' fill='#E8A838'/>
      <polygon points='20,80 40,80 30,62' fill='#2D5EA8'/>
      <polygon points='40,80 60,80 50,62' fill='#C1292E'/>
      <polygon points='60,80 80,80 70,62' fill='#1B6A5A'/>
    </svg>`
  },
  {
    id: 'sadu',
    ar: 'السدو',
    en: 'Al-Sadu',
    reg: 'Central &amp; Northern Bedouin',
    unesco: '2020',
    colors: ['#1A1A1A','#8B2020','#F5F0E0','#C08B3A','#4A3728'],
    size: '60px 30px',
    svg: `<svg xmlns='http://www.w3.org/2000/svg' width='60' height='30'>
      <rect width='60' height='30' fill='#1A1A1A'/>
      <rect width='60' height='3' y='0' fill='#8B2020'/>
      <rect width='60' height='1.5' y='3' fill='#F5F0E0'/>
      <rect width='60' height='2.5' y='4.5' fill='#4A3728'/>
      <polygon points='15,10 23,15 15,20 7,15' fill='#C08B3A'/>
      <polygon points='45,10 53,15 45,20 37,15' fill='#C08B3A'/>
      <rect width='60' height='2.5' y='23' fill='#4A3728'/>
      <rect width='60' height='1.5' y='25.5' fill='#F5F0E0'/>
      <rect width='60' height='3' y='27' fill='#8B2020'/>
    </svg>`
  },
  {
    id: 'najdi',
    ar: 'النجدي',
    en: 'Najdi',
    reg: 'Central Region · Riyadh, Qassim, Ha\'il',
    unesco: null,
    colors: ['#E8D5A3','#7A4F2A','#C8A26A','#5C3D1E','#F2EAD3'],
    size: '80px 80px',
    svg: `<svg xmlns='http://www.w3.org/2000/svg' width='80' height='80'>
      <rect width='80' height='80' fill='#E8D5A3'/>
      <polygon points='40,5 43.8,20.8 57.7,12.3 49.2,26.2 65,30 49.2,33.8 57.7,47.7 43.8,39.2 40,55 36.2,39.2 22.3,47.7 30.8,33.8 15,30 30.8,26.2 22.3,12.3 36.2,20.8' fill='#7A4F2A'/>
      <rect x='0' y='0' width='10' height='10' fill='#7A4F2A'/>
      <rect x='70' y='0' width='10' height='10' fill='#7A4F2A'/>
      <rect x='0' y='70' width='10' height='10' fill='#7A4F2A'/>
      <rect x='70' y='70' width='10' height='10' fill='#7A4F2A'/>
    </svg>`
  },
  {
    id: 'hijaz',
    ar: 'المشربية',
    en: 'Mashrabiya',
    reg: 'Hijaz · Makkah, Madinah, Jeddah',
    unesco: null,
    colors: ['#2C1F15','#D4A853','#8B6040','#F5EFE0','#6B4226'],
    size: '60px 60px',
    svg: `<svg xmlns='http://www.w3.org/2000/svg' width='60' height='60'>
      <rect width='60' height='60' fill='#2C1F15'/>
      <polygon points='18,6 42,6 54,18 54,42 42,54 18,54 6,42 6,18' fill='none' stroke='#D4A853' stroke-width='1.5'/>
      <polygon points='30,22 35,27 30,32 25,27' fill='#D4A853'/>
      <circle cx='0' cy='0' r='5' fill='#D4A853'/>
      <circle cx='60' cy='0' r='5' fill='#D4A853'/>
      <circle cx='0' cy='60' r='5' fill='#D4A853'/>
      <circle cx='60' cy='60' r='5' fill='#D4A853'/>
      <circle cx='30' cy='0' r='3' fill='#D4A853'/>
      <circle cx='30' cy='60' r='3' fill='#D4A853'/>
      <circle cx='0' cy='30' r='3' fill='#D4A853'/>
      <circle cx='60' cy='30' r='3' fill='#D4A853'/>
    </svg>`
  },
  {
    id: 'eastern',
    ar: 'الشرقية',
    en: 'Eastern Province',
    reg: 'Eastern Province · Al-Ahsa, Dammam',
    unesco: null,
    colors: ['#0A3347','#1A7A99','#C9A227','#E8F4F8','#0D4F6C'],
    size: '60px 60px',
    svg: `<svg xmlns='http://www.w3.org/2000/svg' width='60' height='60'>
      <rect width='60' height='60' fill='#0A3347'/>
      <polygon points='0,0 30,0 15,22' fill='#1A7A99'/>
      <polygon points='30,0 60,0 45,22' fill='#1A7A99'/>
      <polygon points='0,60 30,60 15,38' fill='#1A7A99'/>
      <polygon points='30,60 60,60 45,38' fill='#1A7A99'/>
      <line x1='0' y1='22' x2='60' y2='22' stroke='#C9A227' stroke-width='1.2'/>
      <line x1='0' y1='38' x2='60' y2='38' stroke='#C9A227' stroke-width='1.2'/>
      <circle cx='30' cy='30' r='4' fill='#C9A227'/>
      <circle cx='0' cy='0' r='2' fill='#C9A227'/>
      <circle cx='60' cy='0' r='2' fill='#C9A227'/>
      <circle cx='0' cy='60' r='2' fill='#C9A227'/>
      <circle cx='60' cy='60' r='2' fill='#C9A227'/>
    </svg>`
  }
];

function toDataUri(svg) {
  return 'url("data:image/svg+xml,' + encodeURIComponent(svg.trim()) + '")';
}

function makeCss(p) {
  return `/* ${p.en} · ${p.ar} */\nbackground-image: ${toDataUri(p.svg)};\nbackground-size: ${p.size};\nbackground-repeat: repeat;`;
}

const grid = document.getElementById('grid');
const preview = document.getElementById('preview');

patterns.forEach(p => {
  const uri = toDataUri(p.svg);
  const card = document.createElement('div');
  card.className = 'card';
  card.id = 'card-' + p.id;

  const unescoTag = p.unesco ? `<span class="unescobadge">UNESCO ${p.unesco}</span>` : '';

  card.innerHTML = `
    <div class="swatch" style="background-image:${uri};background-size:${p.size};background-repeat:repeat;"></div>
    <div class="info">
      <div class="name-ar">${p.ar}</div>
      <div class="name-en">${p.en}${unescoTag}</div>
      <div class="reg">${p.reg}</div>
      <div class="colors">${p.colors.map(c => `<div class="dot" style="background:${c}" title="${c}"></div>`).join('')}</div>
      <div class="acts">
        <button class="btn preview-btn" onclick="selectPattern('${p.id}')">preview</button>
        <button class="btn" id="btn-${p.id}" onclick="copyCSS(event,'${p.id}')">copy CSS</button>
      </div>
    </div>`;
  grid.appendChild(card);
});

function selectPattern(id) {
  const p = patterns.find(x => x.id === id);
  const uri = toDataUri(p.svg);
  preview.style.backgroundImage = uri.slice(4, -1);
  preview.style.setProperty('background-image', toDataUri(p.svg).slice(4, -1));
  preview.style.backgroundSize = p.size;
  preview.style.backgroundRepeat = 'repeat';

  // use inline style directly
  preview.setAttribute('style',
    `background-image:${toDataUri(p.svg)};background-size:${p.size};background-repeat:repeat;height:200px;border-radius:16px;border:1px solid #E2DDD8;margin-bottom:2rem;display:flex;align-items:flex-end;padding:1.25rem`
  );

  const unescoNote = p.unesco ? ` · UNESCO ${p.unesco}` : '';
  document.getElementById('prev-label').innerHTML = `${p.en} · ${p.ar}${unescoNote}<span>${p.reg}</span>`;
  document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
  document.getElementById('card-' + id).classList.add('active');
}

function copyCSS(e, id) {
  e.stopPropagation();
  const p = patterns.find(x => x.id === id);
  navigator.clipboard.writeText(makeCss(p)).then(() => {
    const btn = document.getElementById('btn-' + id);
    btn.textContent = 'copied!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'copy CSS'; btn.classList.remove('copied'); }, 2500);
  });
}
</script>
</body>
</html>
