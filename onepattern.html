<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Saudi Regional Pattern Library</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Tajawal:wght@300;400;700&display=swap" rel="stylesheet"/>
<style>
  :root {
    --gold: #C9962A;
    --dark: #1a1208;
    --cream: #f5efe0;
    --text: #2a1f0a;
    --card-bg: #fffdf7;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--dark);
    color: var(--cream);
    font-family: 'Tajawal', sans-serif;
    min-height: 100vh;
  }

  header {
    text-align: center;
    padding: 48px 24px 32px;
    border-bottom: 1px solid rgba(201,150,42,0.3);
    background: rgba(0,0,0,0.3);
  }

  header h1 {
    font-family: 'Amiri', serif;
    font-size: clamp(1.8rem, 4vw, 3rem);
    color: var(--gold);
    letter-spacing: 0.05em;
    margin-bottom: 8px;
  }

  header p {
    font-size: 0.95rem;
    opacity: 0.65;
    max-width: 520px;
    margin: 0 auto;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 28px;
    padding: 40px 32px;
    max-width: 1300px;
    margin: 0 auto;
  }

  .card {
    border-radius: 4px;
    overflow: hidden;
    border: 1px solid rgba(201,150,42,0.25);
    background: var(--card-bg);
    color: var(--text);
    display: flex;
    flex-direction: column;
    transition: transform 0.2s, box-shadow 0.2s;
  }

  .card:hover {
    transform: translateY(-4px);
    box-shadow: 0 16px 48px rgba(0,0,0,0.5);
  }

  .preview {
    height: 200px;
    width: 100%;
    position: relative;
    overflow: hidden;
  }

  .preview svg {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
  }

  .info {
    padding: 20px;
    border-top: 1px solid rgba(0,0,0,0.08);
  }

  .region-badge {
    display: inline-block;
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 3px 10px;
    border-radius: 2px;
    margin-bottom: 10px;
    background: var(--gold);
    color: white;
  }

  .info h2 {
    font-family: 'Amiri', serif;
    font-size: 1.25rem;
    margin-bottom: 6px;
    color: var(--dark);
  }

  .info p {
    font-size: 0.82rem;
    opacity: 0.65;
    line-height: 1.6;
    margin-bottom: 14px;
  }

  .actions {
    display: flex;
    gap: 8px;
  }

  .btn {
    flex: 1;
    padding: 9px 14px;
    font-size: 0.78rem;
    font-family: 'Tajawal', sans-serif;
    font-weight: 700;
    letter-spacing: 0.06em;
    cursor: pointer;
    border-radius: 2px;
    border: none;
    transition: all 0.15s;
  }

  .btn-primary {
    background: var(--dark);
    color: var(--gold);
    border: 1px solid var(--dark);
  }

  .btn-primary:hover { background: #2d1f0a; }

  .btn-secondary {
    background: transparent;
    color: var(--text);
    border: 1px solid rgba(0,0,0,0.18);
  }

  .btn-secondary:hover { background: rgba(0,0,0,0.05); }

  /* ---- MODAL ---- */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.8);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--card-bg);
    color: var(--text);
    border-radius: 4px;
    max-width: 700px;
    width: 100%;
    overflow: hidden;
    border: 1px solid rgba(201,150,42,0.4);
  }

  .modal-preview {
    height: 220px;
    overflow: hidden;
    position: relative;
  }

  .modal-preview svg {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
  }

  .modal-body { padding: 24px; }

  .modal-body h3 {
    font-family: 'Amiri', serif;
    font-size: 1.5rem;
    margin-bottom: 4px;
  }

  .modal-body .desc {
    font-size: 0.85rem;
    opacity: 0.6;
    margin-bottom: 16px;
  }

  .code-block {
    background: #1a1208;
    color: #e8d5a3;
    border-radius: 3px;
    padding: 16px;
    font-size: 0.75rem;
    font-family: monospace;
    line-height: 1.7;
    overflow-x: auto;
    white-space: pre;
    margin-bottom: 14px;
  }

  .modal-actions { display: flex; gap: 10px; }

  .close-btn {
    margin-top: 0;
    background: transparent;
    border: 1px solid rgba(0,0,0,0.2);
    color: var(--text);
    padding: 9px 18px;
    cursor: pointer;
    font-family: 'Tajawal', sans-serif;
    font-size: 0.82rem;
    border-radius: 2px;
  }

  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--gold);
    color: white;
    padding: 10px 24px;
    border-radius: 2px;
    font-size: 0.85rem;
    font-weight: 700;
    transition: transform 0.3s;
    z-index: 200;
  }

  .toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<header>
  <h1>Saudi Regional Pattern Library</h1>
  <p>Traditional patterns from across the Kingdom — ready to use as CSS backgrounds in your webapp</p>
</header>

<div class="grid" id="grid"></div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modal">
    <div class="modal-preview" id="modalPreview"></div>
    <div class="modal-body">
      <h3 id="modalTitle"></h3>
      <p class="desc" id="modalDesc"></p>
      <div class="code-block" id="modalCode"></div>
      <div class="modal-actions">
        <button class="btn btn-primary" onclick="copyCode()">Copy CSS</button>
        <button class="close-btn" onclick="closeModal()">Close</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast">CSS Copied!</div>

let currentPattern = null;

function buildGrid() {
  const grid = document.getElementById('grid');
  patterns.forEach((p, i) => {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <div class="preview" style="background:${previewBg(p)};${p.css.split('\n').slice(1).join('\n')}">
        ${p.svgPattern}
      </div>
      <div class="info">
        <div>
          <span class="region-badge">${p.region}</span>
          ${p.unesco ? '<span class="region-badge" style="background:#2A9D8F;margin-left:4px">UNESCO ✓</span>' : ''}
        </div>
        <h2>${p.name}</h2>
        <p>${p.desc}</p>
        <div class="actions">
          <button class="btn btn-primary" onclick="openModal(${i})">View CSS</button>
          <button class="btn btn-secondary" onclick="quickCopy(${i},this)">Copy</button>
        </div>
      </div>
    `;
    grid.appendChild(card);
  });
}

function previewBg(p) {
  const first = p.css.split('\n')[0];
  return first.replace('background-color:','').trim().replace(';','');
}

function openModal(i) {
  currentPattern = patterns[i];
  const overlay = document.getElementById('modalOverlay');
  document.getElementById('modalPreview').innerHTML = currentPattern.svgPattern;
  document.getElementById('modalPreview').style.cssText = `height:220px;overflow:hidden;position:relative;${currentPattern.css}`;
  document.getElementById('modalTitle').textContent = currentPattern.name;
  document.getElementById('modalDesc').textContent = `Region: ${currentPattern.region} — ${currentPattern.desc}`;
  document.getElementById('modalCode').textContent = `/* ${currentPattern.name} — ${currentPattern.region} */\n.your-element {\n  ${currentPattern.css.split('\n').join('\n  ')}\n}`;
  overlay.classList.add('open');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
}

function copyCode() {
  if (!currentPattern) return;
  const code = `/* ${currentPattern.name} — ${currentPattern.region} */\n.your-element {\n  ${currentPattern.css.split('\n').join('\n  ')}\n}`;
  navigator.clipboard.writeText(code);
  showToast();
}

function quickCopy(i, btn) {
  const p = patterns[i];
  const code = `/* ${p.name} — ${p.region} */\n.your-element {\n  ${p.css.split('\n').join('\n  ')}\n}`;
  navigator.clipboard.writeText(code);
  btn.textContent = 'Copied!';
  setTimeout(() => btn.textContent = 'Copy', 2000);
}

function showToast() {
  const t = document.getElementById('toast');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

document.getElementById('modalOverlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

buildGrid();
</script>
