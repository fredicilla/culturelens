<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Community — CultureLens</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="regional-patterns.css">
<style>
  .page-wrap {
    max-width: 460px;
    margin: 0 auto;
    padding: 96px 16px 120px;
    width: 100%;
  }

  .page-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
  }
  .page-head-title {
    font-family: 'saudi-font', 'Segoe UI', Tahoma, sans-serif;
    font-size: 24px;
    font-weight: 700;
    color: var(--white);
  }
  .page-head-sub {
    font-size: 12px;
    color: var(--text-light);
    margin-top: 2px;
  }

  .new-post-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 10px 16px;
    border-radius: 999px;
    background: var(--gold);
    color: var(--green);
    font-weight: 700;
    font-size: 13px;
    border: none;
    cursor: pointer;
    box-shadow: 0 4px 16px rgba(201,168,76,0.35);
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .new-post-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 22px rgba(201,168,76,0.55); }
  .new-post-btn .plus {
    display: inline-block; width: 16px; height: 16px;
    position: relative;
  }
  .new-post-btn .plus::before,
  .new-post-btn .plus::after {
    content:''; position:absolute; background:var(--green); border-radius:2px;
  }
  .new-post-btn .plus::before { top:50%; left:0; right:0; height:2px; transform:translateY(-50%); }
  .new-post-btn .plus::after  { left:50%; top:0; bottom:0; width:2px; transform:translateX(-50%); }

  /* ── POST CARD ── */
  .post-card {
    background: var(--card-dark);
    border: 1px solid rgba(201,168,76,0.18);
    border-radius: 16px;
    padding: 16px;
    margin-bottom: 14px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
  }
  .post-head { display: flex; align-items: center; gap: 12px; }
  .avatar {
    width: 42px; height: 42px; border-radius: 50%;
    background: linear-gradient(135deg, var(--gold), var(--gold-lt));
    color: var(--green);
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 14px;
    flex-shrink: 0;
    box-shadow: 0 2px 8px rgba(201,168,76,0.4);
  }
  .post-meta { flex: 1; min-width: 0; }
  .post-user {
    font-size: 14px; font-weight: 700; color: var(--white);
    display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
  }
  .region-pill {
    padding: 3px 10px; border-radius: 999px;
    background: rgba(201,168,76,0.14);
    border: 1px solid rgba(201,168,76,0.35);
    color: var(--gold);
    font-size: 10px; font-weight: 600; letter-spacing: 0.3px;
  }
  .post-time { font-size: 11px; color: var(--text-light); margin-top: 2px; }

  .post-text {
    margin-top: 12px;
    font-size: 14px; line-height: 1.6; color: var(--cream);
  }
  .post-image {
    margin-top: 12px; width: 100%;
    border-radius: 14px; overflow: hidden;
    border: 1px solid rgba(201,168,76,0.15);
  }
  .post-image img { display: block; width: 100%; height: auto; }

  .post-actions {
    display: flex; gap: 20px; margin-top: 14px;
    padding-top: 12px;
    border-top: 1px solid rgba(201,168,76,0.1);
  }
  .action-btn {
    display: inline-flex; align-items: center; gap: 8px;
    background: transparent; border: none; cursor: pointer;
    color: var(--text-light); font-size: 13px; font-weight: 600;
    padding: 4px 0;
    transition: color 0.2s;
  }
  .action-btn:hover { color: var(--gold); }
  .action-btn.liked { color: #E8695B; }

  /* Pure-CSS heart */
  .heart {
    width: 18px; height: 16px; position: relative; display: inline-block;
  }
  .heart::before, .heart::after {
    content:''; position:absolute; top:0;
    width: 9px; height: 14px;
    background: transparent;
    border: 2px solid currentColor;
    border-radius: 9px 9px 0 0;
  }
  .heart::before { left: 9px; transform: rotate(45deg); transform-origin: 0 100%; }
  .heart::after  { left: 0;  transform: rotate(-45deg); transform-origin: 100% 100%; }
  .action-btn.liked .heart::before,
  .action-btn.liked .heart::after {
    background: #E8695B; border-color: #E8695B;
  }

  /* Pure-CSS speech bubble */
  .bubble {
    width: 18px; height: 14px; position: relative; display: inline-block;
    border: 2px solid currentColor; border-radius: 4px;
  }
  .bubble::after {
    content:''; position: absolute; bottom: -5px; left: 4px;
    width: 0; height: 0;
    border-left: 4px solid transparent;
    border-right: 4px solid transparent;
    border-top: 5px solid currentColor;
  }

  /* ── COMMENTS ── */
  .comments {
    margin-top: 14px;
    padding-top: 12px;
    border-top: 1px solid rgba(201,168,76,0.1);
    display: none;
  }
  .comments.open { display: block; }

  .comment {
    display: flex; gap: 10px; margin-bottom: 10px;
  }
  .comment .avatar { width: 32px; height: 32px; font-size: 12px; }
  .comment-body {
    flex: 1; background: rgba(255,255,255,0.03);
    border: 1px solid rgba(201,168,76,0.1);
    border-radius: 12px;
    padding: 8px 12px;
  }
  .comment-user { font-size: 12px; font-weight: 700; color: var(--gold); margin-bottom: 2px; }
  .comment-text { font-size: 13px; color: var(--cream); line-height: 1.5; }

  .comment-input-row {
    display: flex; gap: 8px; margin-top: 12px;
  }
  .comment-input {
    flex: 1;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(201,168,76,0.2);
    color: var(--cream);
    padding: 10px 14px;
    border-radius: 999px;
    font-size: 13px;
    outline: none;
    font-family: inherit;
  }
  .comment-input:focus { border-color: var(--gold); }
  .comment-send {
    padding: 0 16px;
    background: var(--gold); color: var(--green);
    border: none; border-radius: 999px;
    font-weight: 700; font-size: 12px; cursor: pointer;
  }

  /* ── COMPOSER OVERLAY ── */
  .composer-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.72);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    display: none;
    align-items: center; justify-content: center;
    z-index: 200;
    padding: 20px;
  }
  .composer-overlay.open { display: flex; }

  .composer {
    width: 100%; max-width: 440px;
    background: var(--card-dark);
    border: 1px solid rgba(201,168,76,0.3);
    border-radius: 20px;
    padding: 20px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.6);
    animation: fadeUp 0.3s ease;
  }
  .composer-head {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 16px;
  }
  .composer-title {
    font-size: 16px; font-weight: 700; color: var(--gold);
  }
  .composer-close {
    width: 32px; height: 32px; border-radius: 50%;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(201,168,76,0.2);
    color: var(--cream);
    font-size: 16px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }

  .composer textarea {
    width: 100%;
    min-height: 110px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(201,168,76,0.2);
    border-radius: 14px;
    padding: 14px;
    color: var(--cream);
    font-size: 14px;
    font-family: inherit;
    resize: vertical;
    outline: none;
  }
  .composer textarea:focus { border-color: var(--gold); }

  .composer-row {
    display: flex; gap: 10px; margin-top: 12px;
    align-items: center; flex-wrap: wrap;
  }

  .region-select {
    flex: 1; min-width: 0;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(201,168,76,0.25);
    border-radius: 10px;
    color: var(--cream);
    padding: 10px 12px;
    font-size: 13px; font-family: inherit;
    outline: none;
    cursor: pointer;
  }
  .region-select:focus { border-color: var(--gold); }
  .region-select option { background: var(--card-dark); color: var(--cream); }

  .img-upload-btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 9px 14px;
    background: rgba(201,168,76,0.1);
    border: 1px solid rgba(201,168,76,0.35);
    border-radius: 10px;
    color: var(--gold);
    font-size: 12px; font-weight: 600; cursor: pointer;
  }
  .img-upload-btn input { display: none; }

  .img-preview {
    margin-top: 12px;
    display: none;
    border-radius: 12px; overflow: hidden;
    border: 1px solid rgba(201,168,76,0.2);
    position: relative;
  }
  .img-preview.show { display: block; }
  .img-preview img { display: block; width: 100%; height: auto; max-height: 260px; object-fit: cover; }
  .img-remove {
    position: absolute; top: 8px; right: 8px;
    width: 28px; height: 28px; border-radius: 50%;
    background: rgba(0,0,0,0.7); color: white;
    border: none; cursor: pointer; font-size: 14px;
    display: flex; align-items: center; justify-content: center;
  }

  .composer-submit {
    margin-top: 16px; width: 100%;
    padding: 13px;
    background: var(--gold); color: var(--green);
    border: none; border-radius: 12px;
    font-size: 14px; font-weight: 700;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .composer-submit:hover { transform: translateY(-1px); box-shadow: 0 6px 22px rgba(201,168,76,0.45); }
  .composer-submit:disabled { opacity: 0.4; cursor: not-allowed; transform:none; box-shadow:none; }
</style>
</head>
<body>

<header class="cl-header">
  <a href="index.html" class="back-btn">‹</a>
  <div class="logo translatable" data-en="<img src='logo.png' class='logo-img'> Culture<span>Lens</span>" data-ar="<img src='logo.png' class='logo-img'> عدسة <span>الثقافة</span>" data-html="true"><img src="logo.png" class="logo-img"> Culture<span>Lens</span></div>
  <div style="display:flex;align-items:center;gap:12px;">
    <div style="font-size:10px;color:var(--text-light);text-align:right" class="translatable" data-en="✦ Community" data-ar="✦ المجتمع">✦ Community</div>
    <button id="lang-toggle" onclick="toggleLanguage()"><span id="lang-label">🇸🇦 العربية</span></button>
  </div>
</header>

<main class="page-wrap">
  <div class="page-head">
    <div>
      <div class="page-head-title translatable" data-en="Community" data-ar="المجتمع">Community</div>
      <div class="page-head-sub translatable" data-en="Share your culture, stories & moments" data-ar="شارك ثقافتك وقصصك ولحظاتك">Share your culture, stories & moments</div>
    </div>
    <button class="new-post-btn translatable" onclick="openComposer()" data-en="<span class='plus'></span> New Post" data-ar="<span class='plus'></span> منشور جديد" data-html="true"><span class="plus"></span> New Post</button>
  </div>

  <div id="feed"></div>
</main>

<!-- ── COMPOSER OVERLAY ── -->
<div class="composer-overlay" id="composer-overlay">
  <div class="composer">
    <div class="composer-head">
      <div class="composer-title translatable" data-en="Create Post" data-ar="منشور جديد">Create Post</div>
      <button class="composer-close" onclick="closeComposer()" aria-label="Close">✕</button>
    </div>

    <textarea id="composer-text" class="translatable" data-en-placeholder="What's on your mind?" data-ar-placeholder="وش يدور ببالك؟" placeholder="What's on your mind?"></textarea>

    <div class="composer-row">
      <select id="composer-region" class="region-select">
        <option value="" disabled selected class="translatable" data-en="Select your region..." data-ar="اختر منطقتك...">Select your region...</option>
        <option value="Riyadh">Riyadh — الرياض</option>
        <option value="Makkah">Makkah — مكة المكرمة</option>
        <option value="Madinah">Madinah — المدينة المنورة</option>
        <option value="Eastern Province">Eastern Province — المنطقة الشرقية</option>
        <option value="Asir">Asir — عسير</option>
        <option value="Tabuk">Tabuk — تبوك</option>
        <option value="Hail">Hail — حائل</option>
        <option value="Northern Borders">Northern Borders — الحدود الشمالية</option>
        <option value="Jizan">Jizan — جازان</option>
        <option value="Najran">Najran — نجران</option>
        <option value="Al Bahah">Al Bahah — الباحة</option>
        <option value="Al Jawf">Al Jawf — الجوف</option>
        <option value="Qassim">Qassim — القصيم</option>
      </select>

      <label class="img-upload-btn translatable" data-en="📷 Photo" data-ar="📷 صورة">
        📷 Photo
        <input type="file" id="composer-image" accept="image/*" onchange="previewImage(event)">
      </label>
    </div>

    <div class="img-preview" id="img-preview">
      <img id="img-preview-el" alt="Preview">
      <button class="img-remove" onclick="removePreview()" aria-label="Remove image">✕</button>
    </div>

    <button class="composer-submit translatable" onclick="submitPost()" data-en="Post" data-ar="نشر">Post</button>
  </div>
</div>

<footer class="cl-footer">
  <div>هاكاثون نورة 2026 | CultureLens</div>
</footer>

<script>
// ── SAMPLE SEED DATA ──
const samplePosts = [
  {
    id: 1,
    user: 'Noura Al-Qahtani',
    initials: 'NQ',
    region: 'Asir',
    time: '2h',
    text: "Spent the morning in Rijal Almaa painting Al-Qatt Al-Asiri with my grandmother. The geometric patterns are a language older than any of us — every shape tells you about a family, a valley, a season. 🎨",
    image: 'mudhouse.png',
    likes: 42,
    liked: false,
    comments: [
      { user: 'Turki A.', text: "This is beautiful. My mother still paints the majlis ceiling this way." },
      { user: 'Layla M.', text: "Rijal Almaa is magical. Next trip for sure!" }
    ]
  },
  {
    id: 2,
    user: 'Abdullah Al-Ghamdi',
    initials: 'AG',
    region: 'Riyadh',
    time: '6h',
    text: "Hosted my first Najdi majlis last night. Served the eldest first, poured exactly ¼ of the finjan each time. My uncle finally nodded in approval — that silent nod means more than any compliment. ☕",
    image: null,
    likes: 89,
    liked: true,
    comments: [
      { user: 'Khalid R.', text: "That nod is the real graduation certificate 😄" },
      { user: 'Sara H.', text: "ما شاء الله! The quarter finjan rule is everything." },
      { user: 'Omar F.', text: "Welcome to the brotherhood of hosts 👏" }
    ]
  },
  {
    id: 3,
    user: 'Reem Al-Harbi',
    initials: 'RH',
    region: 'Madinah',
    time: '1d',
    text: "Recording oud sessions with my father this week. He learned from his grandfather in Al-Hijaz. Some of these maqams have never been written down — they only live in the hands that pass them on. 🎵",
    image: null,
    likes: 124,
    liked: false,
    comments: [
      { user: 'Mansour K.', text: "Please share when you can. This is heritage preservation." }
    ]
  }
];

let posts = [...samplePosts];
let nextId = 100;

// ── RENDER FEED ──
function renderFeed() {
  const feed = document.getElementById('feed');
  feed.innerHTML = posts.map(renderPost).join('');
  // re-apply language translations on freshly-rendered nodes
  if (typeof applyLanguage === 'function') applyLanguage();
}

function esc(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function renderPost(p) {
  const initials = esc(p.initials);
  return `
    <article class="post-card" data-id="${p.id}">
      <div class="post-head">
        <div class="avatar">${initials}</div>
        <div class="post-meta">
          <div class="post-user">
            ${esc(p.user)}
            <span class="region-pill">${esc(p.region)}</span>
          </div>
          <div class="post-time">${esc(p.time)}</div>
        </div>
      </div>
      <div class="post-text">${esc(p.text)}</div>
      ${p.image ? `<div class="post-image"><img src="${esc(p.image)}" alt="Post image"></div>` : ''}
      <div class="post-actions">
        <button class="action-btn ${p.liked ? 'liked' : ''}" onclick="toggleLike(${p.id})">
          <span class="heart"></span>
          <span>${p.likes}</span>
        </button>
        <button class="action-btn" onclick="toggleComments(${p.id})">
          <span class="bubble"></span>
          <span>${p.comments.length}</span>
        </button>
      </div>
      <div class="comments" id="comments-${p.id}">
        ${p.comments.map(c => `
          <div class="comment">
            <div class="avatar">${esc(c.user.split(' ').map(w=>w[0]).slice(0,2).join(''))}</div>
            <div class="comment-body">
              <div class="comment-user">${esc(c.user)}</div>
              <div class="comment-text">${esc(c.text)}</div>
            </div>
          </div>
        `).join('')}
        <div class="comment-input-row">
          <input type="text" class="comment-input" id="comment-input-${p.id}"
            placeholder="Write a comment..."
            data-en-placeholder="Write a comment..."
            data-ar-placeholder="اكتب تعليق..."
            onkeydown="if(event.key==='Enter') sendComment(${p.id})">
          <button class="comment-send translatable" onclick="sendComment(${p.id})" data-en="Send" data-ar="إرسال">Send</button>
        </div>
      </div>
    </article>
  `;
}

// ── INTERACTIONS ──
function toggleLike(id) {
  const p = posts.find(x => x.id === id);
  if (!p) return;
  p.liked = !p.liked;
  p.likes += p.liked ? 1 : -1;
  renderFeed();
}

function toggleComments(id) {
  const el = document.getElementById('comments-' + id);
  if (el) el.classList.toggle('open');
}

function sendComment(id) {
  const input = document.getElementById('comment-input-' + id);
  if (!input || !input.value.trim()) return;
  const p = posts.find(x => x.id === id);
  p.comments.push({ user: 'You', text: input.value.trim() });
  renderFeed();
  // keep comments open
  document.getElementById('comments-' + id).classList.add('open');
}

// ── COMPOSER ──
function openComposer() {
  document.getElementById('composer-overlay').classList.add('open');
}
function closeComposer() {
  document.getElementById('composer-overlay').classList.remove('open');
  document.getElementById('composer-text').value = '';
  document.getElementById('composer-region').value = '';
  removePreview();
}

let pendingImageData = null;
function previewImage(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    pendingImageData = ev.target.result;
    document.getElementById('img-preview-el').src = pendingImageData;
    document.getElementById('img-preview').classList.add('show');
  };
  reader.readAsDataURL(file);
}
function removePreview() {
  pendingImageData = null;
  document.getElementById('composer-image').value = '';
  document.getElementById('img-preview').classList.remove('show');
}

function submitPost() {
  const text = document.getElementById('composer-text').value.trim();
  const region = document.getElementById('composer-region').value;
  if (!text || !region) {
    alert(window.currentLang === 'ar'
      ? 'اكتب منشور واختر منطقتك'
      : 'Write something and pick a region');
    return;
  }
  posts.unshift({
    id: nextId++,
    user: 'You',
    initials: 'YO',
    region,
    time: 'now',
    text,
    image: pendingImageData,
    likes: 0,
    liked: false,
    comments: []
  });
  closeComposer();
  renderFeed();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// close composer on backdrop click
document.getElementById('composer-overlay').addEventListener('click', e => {
  if (e.target.id === 'composer-overlay') closeComposer();
});

// initial render
renderFeed();
</script>

<script src="language.js"></script>
<script src="ThemeManager.js"></script>
<script>window.ACTIVE_NAV = 'community';</script>
<script src="navbar.js"></script>
</body>
</html>
